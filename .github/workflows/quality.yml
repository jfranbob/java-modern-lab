name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  formatting:
    name: Formatting (Spotless + Checkstyle)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: 26
          distribution: temurin
          cache: maven

      - name: Check formatting and style
        run: ./mvnw validate --batch-mode

  static-analysis:
    name: Static Analysis (SpotBugs + PMD)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: 26
          distribution: temurin
          cache: maven

      - name: Run static analysis
        run: ./mvnw spotbugs:check pmd:check pmd:cpd-check --batch-mode
